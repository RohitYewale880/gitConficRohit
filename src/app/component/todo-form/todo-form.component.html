<mat-card>
    <h2 ><Strong>{{isIneditmode? "UPDATE TODO":"ADD TODO"}}</Strong></h2>
    <div class="form-group">
        <label for="TodoItem">Todo Item</label>
        <input type="text" class="form-control" #TodoItem>
    </div>
    <button (click)="onTodoAdd()" mat-raised-button color="primary" class="w-100" *ngIf="!isIneditmode">Add Todo</button>
    <button mat-raised-button color="primary" class="w-100" *ngIf="isIneditmode" (click)="onupdatebtn()" >Update Todo</button>

</mat-card>
