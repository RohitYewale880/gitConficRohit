<mat-card>
    <div class="form-group">
        <label for="TodoItem">Todo Item</label>
        <input type="text" class="form-control" #TodoItem>
    </div>
    <button  (click)="onTodoAdd()" mat-raised-button color="primary" class="w-100" >Add Todo</button>
    <button mat-raised-button color="primary" class="w-100"  (click)="onupdatebtn()" >Update Todo</button>

</mat-card>
